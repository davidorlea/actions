name: prek

inputs:
  uv-command:
    required: true

runs:
  using: composite
  steps:
    - name: Install Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version-file: "pyproject.toml"
        check-latest: true
    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
    - name: Run uv command
      shell: bash
      run: uv run --locked ${{ inputs.uv-command }}
